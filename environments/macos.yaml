name: benchmark_macos
dependencies:
  - python=3.10
  - pip
  - pip:
    # RadT dependencies
    - tensorflow
    - tensorboardX
    - mlflow>=3.0
    - boto3
    - psutil
    - radt>=0.2.24

    # Tracing + Perfetto export
    - sqlalchemy
    - pandas
    - psycopg2-binary
    - perfetto

    # benchmark dependencies
    ## general
    - torch
    - torchvision
    - torchaudio
    - torchtune
    - transformers
    - datasets
    - peft
    - pydantic_yaml
    - outlines

    ## multimodal VQA case study
    - faiss-cpu
    - coremltools
    - Pillow

    ## Self-RAG case study
    - chromadb

    ## local inference engines (stages.llm_server)
    # litellm talks to a local Ollama server over its HTTP API. vLLM is
    # NVIDIA-only, so only the Ollama engine is usable on macOS.
    - litellm

    ## macos specific
    - mlx
    - mlx-lm
    # ANEMLL will be installed from source
   
