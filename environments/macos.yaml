name: benchmark_macos
dependencies:
  - python=3.10
  - pip
  - pip:
    # RadT dependencies
    - tensorflow
    - tensorboardX
    - mlflow>=1.0
    - boto3
    - psutil
    - radt>=0.2.24

    # benchmark dependencies
    ## general
    - torch
    - torchvision
    - torchaudio
    - torchtune
    - transformers
    - datasets
    - peft
    - pydantic_yaml
