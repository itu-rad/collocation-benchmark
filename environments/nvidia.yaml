# Versions pinned to the verified-working paper env (`benchmark_nvidia`):
# transformers 5.2.0, torchaudio 2.10.0 (matching torch 2.10.0), mlflow 3.10.0,
# etc. Only the packages already listed here are pinned -- pip still resolves
# transitive deps. The previously un-pinned entries (esp. torchaudio,
# transformers) drifted to incompatible versions on fresh installs and broke all
# model loading; see REPLICATION_NOTES.md.
name: benchmark_nvidia
dependencies:
  - python=3.10.19
  - pip
  - pip:
    # On DGX Spark (GB10, sm_121 / aarch64) the default `torch` wheel is
    # CPU-only. Pull the CUDA build from the cu130 index instead.
    - --extra-index-url https://download.pytorch.org/whl/cu130

    # RadT dependencies
    - tensorflow==2.20.0
    - tensorboardX==2.6.4
    - mlflow==3.10.0
    - boto3==1.42.57
    - psutil==7.2.2
    # radt async_tracing branch (non-blocking MLflow span export -> realistic tracing
    # overhead; replaces the blocking sync export of 0.2.28). Pinned to commit 3ba61cb of
    # feat/Sipondo/async_tracing; the installable package lives in the radt/ subdirectory.
    - git+https://github.com/Resource-Aware-Data-systems-RAD/radt.git@3ba61cb1b541a38b531bd90d05843ef97f86b995#subdirectory=radt

    # Tracing + Perfetto export
    - sqlalchemy==2.0.47
    - pandas==2.3.3
    - psycopg2-binary==2.9.12   # not present in paper env; version from a clean validated build
    - perfetto==0.56.0          # not present in paper env; version from a clean validated build

    # benchmark dependencies
    ## general
    - torch==2.10.0+cu130       # GB10: CUDA build (plain `torch` is CPU-only here)
    - torchvision==0.25.0+cu130
    - torchaudio==2.10.0        # MUST match torch 2.10; un-pinned drifts to 2.11 and breaks transformers
    - torchtune==0.6.1
    - transformers==5.2.0
    - datasets==4.6.0
    - peft==0.18.1
    - pydantic_yaml==1.6.0
    - outlines==1.2.11
    - tf-keras==2.20.1 # for compatibility between transformers and tensorflow

    ## Self-RAG case study
    - chromadb==1.5.9

    ## local inference engines (stages.llm_server)
    # litellm is the OpenAI-compatible client used to talk to the local server.
    - litellm
    # vLLM provides the dynamic/continuous-batching server. NOTE: verify the
    # wheel builds/serves on this GB10 (aarch64, sm_121 / cu130) box — it may
    # need a specific nightly or a source build. Ollama (external binary) is
    # the cross-platform fallback and needs no pip dependency.
    - vllm

    ## nvidia specific
    # possibly TensorRT or other NVIDIA/CUDA specific dependencies
