name: benchmark_nvidia
dependencies:
  - python=3.10
  - pip
  - pip:
    # On DGX Spark (GB10, sm_121 / aarch64) the default `torch` wheel is
    # CPU-only. Pull the CUDA build from the cu130 index instead.
    - --extra-index-url https://download.pytorch.org/whl/cu130

    # RadT dependencies
    - tensorflow
    - tensorboardX
    - mlflow>=3.0
    - boto3
    - psutil
    - radt>=0.2.23

    # Tracing + Perfetto export
    - sqlalchemy
    - pandas
    - psycopg2-binary
    - perfetto

    # benchmark dependencies
    ## general
    - torch==2.10.0+cu130       # GB10: CUDA build (plain `torch` is CPU-only here)
    - torchvision==0.25.0+cu130
    - torchaudio
    - torchtune
    - transformers
    - datasets
    - peft
    - pydantic_yaml
    - outlines
    - tf-keras # for compatibility between transformers and tensorflow

    ## Self-RAG case study
    - chromadb

    ## local inference engines (stages.llm_server)
    # litellm is the OpenAI-compatible client used to talk to the local server.
    - litellm
    # vLLM provides the dynamic/continuous-batching server. NOTE: verify the
    # wheel builds/serves on this GB10 (aarch64, sm_121 / cu130) box — it may
    # need a specific nightly or a source build. Ollama (external binary) is
    # the cross-platform fallback and needs no pip dependency.
    - vllm

    ## nvidia specific
    # possibly TensorRT or other NVIDIA/CUDA specific dependencies
    
   
