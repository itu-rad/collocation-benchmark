name: "Self-RAG Decomposed-Shared — 1x4B, 3 calls (factoid, Ollama)"
# Ollama-served counterpart of factoid_decomposed_shared_cuda.yml: same
# decomposed graph (grade -> generate -> hallucination-check -> optional
# rewrite) on a single resident 4B, served by a local Ollama server (launched
# in-process) and called over its HTTP API via litellm. Stage 3 owns the
# server; the generate/hallucination/rewrite stages reuse it via depends_on_id.
# `tokenizer_name` gives the formatters an HF tokenizer to chat-template with;
# the Ollama `model` tag is used for generation. Ollama only batches concurrent
# requests up to OLLAMA_NUM_PARALLEL (raise it via server.env for more).
listeners:
  - dcgmi
  - top
  - iostat
pipelines:
  - name: Self-RAG Decomposed-Shared Ollama
    inputs: [0]
    outputs: [12]
    dataset_stage_id: 0
    loadgen:
      component: loadgen.PoissonLoadScheduler
      queue_depth: 50
      max_queries: 30
      timeout: 600000
      config:
        rate: 4.0
    stages:
      # --- Stage 0: Question DataLoader ---
      - name: Question dataloader
        id: 0
        outputs: [1]
        component: stages.self_rag.SelfRAGDataLoader
        config:
          batch_size: 1
          dataset:
            name: rag-datasets/rag-mini-wikipedia
            subset: question-answer
            split: test
            question_column: question
            answers_column: answer

      # --- Stage 1: ChromaDB Retriever ---
      - name: Document retriever
        id: 1
        outputs: [2]
        component: stages.self_rag.ChromaRetriever
        polling_policy: utils.queues.polling.FirstSubmittedPolicy
        config:
          corpus_dataset:
            name: rag-datasets/rag-mini-wikipedia
            subset: text-corpus
            split: passages
            text_column: passage
            max_docs: 3200
          top_k: 3
          collection_name: self_rag_factoid_decomposed_corpus

      # --- Stage 2: Retrieval Grader Formatter ---
      - name: Retrieval grader formatter
        id: 2
        outputs: [3]
        component: stages.self_rag.RetrievalGraderFormatter
        config:
          tokenizer_stage_id: 3

      # --- Stage 3: Shared LLM — grade call (owns the Ollama server) ---
      - name: Shared LLM (grade)
        id: 3
        outputs: [4]
        component: stages.llm_server.Inference
        config:
          server:
            engine: ollama
            # qwen3.5:4b = the same Qwen3.5-4B weights as the HF/vLLM arms, so
            # all three engines are compared on identical weights.
            model: qwen3.5:4b
            port: 0
          tokenizer_name: Qwen/Qwen3.5-4B
          concurrency: 4
          model:
            gen_kwargs:
              max_new_tokens: 16
              do_sample: false
              think: false   # disable qwen3.5:4b reasoning (see header note)

      # --- Stage 4: Grade Router ---
      - name: Grade router
        id: 4
        outputs: [5, 10, 12]
        component: stages.self_rag.BinaryRouter
        config:
          max_retries: 2
          retry_is_yes: False
          yes_stage_id: 5
          no_stage_id: 10
          end_stage_id: 12

      # --- Stage 5: Answer Generator Formatter ---
      - name: Answer generator formatter
        id: 5
        outputs: [6]
        component: stages.self_rag.AnswerGeneratorFormatter
        polling_policy: utils.queues.polling.FirstSubmittedPolicy
        config:
          tokenizer_stage_id: 3

      # --- Stage 6: Shared LLM — generate call (shares stage 3's server) ---
      - name: Shared LLM (generate)
        id: 6
        outputs: [7]
        component: stages.llm_server.Inference
        config:
          concurrency: 4
          model:
            gen_kwargs:
              max_new_tokens: 256
              do_sample: false
              think: false   # disable qwen3.5:4b reasoning (see header note)
          depends_on_id: 3

      # --- Stage 7: Hallucination Grader Formatter ---
      - name: Hallucination grader formatter
        id: 7
        outputs: [8]
        component: stages.self_rag.HallucinationGraderFormatter
        config:
          tokenizer_stage_id: 3

      # --- Stage 8: Shared LLM — hallucination call (shares stage 3's server) ---
      - name: Shared LLM (hallucination)
        id: 8
        outputs: [9]
        component: stages.llm_server.Inference
        config:
          concurrency: 4
          model:
            gen_kwargs:
              max_new_tokens: 16
              do_sample: false
              think: false   # disable qwen3.5:4b reasoning (see header note)
          depends_on_id: 3

      # --- Stage 9: Hallucination Router ---
      - name: Hallucination router
        id: 9
        outputs: [5, 12, 12]
        component: stages.self_rag.BinaryRouter
        config:
          max_retries: 2
          retry_is_yes: True
          yes_stage_id: 5
          no_stage_id: 12
          end_stage_id: 12

      # --- Stage 10: Query Rewrite Formatter ---
      - name: Query rewrite formatter
        id: 10
        outputs: [11]
        component: stages.self_rag.QuestionRewriterFormatter
        config:
          tokenizer_stage_id: 3

      # --- Stage 11: Shared LLM — rewrite call (shares stage 3's server) ---
      - name: Shared LLM (rewrite)
        id: 11
        outputs: [1]
        component: stages.llm_server.Inference
        config:
          concurrency: 4
          model:
            gen_kwargs:
              max_new_tokens: 128
              do_sample: false
              think: false   # disable qwen3.5:4b reasoning (see header note)
          depends_on_id: 3

      # --- Stage 12: End Stage (capture sidecar) ---
      - name: End stage
        id: 12
        component: stages.TerminalCapture
        polling_policy: utils.queues.polling.FirstSubmittedPolicy
