name: "Self-RAG Monolith (multi-hop / HotpotQA, CUDA)"
listeners:
  - dcgmi
  - top
  - iostat
pipelines:
  - name: Self-RAG Monolith (multi-hop)
    inputs: [0]
    outputs: [5]
    dataset_stage_id: 0
    loadgen:
      component: loadgen.PoissonLoadScheduler
      queue_depth: 50
      max_queries: 30
      timeout: 600000
      config:
        rate: 4.0
    stages:
      # --- Stage 0: Question DataLoader (HotpotQA multi-hop) ---
      - name: Question dataloader
        id: 0
        outputs: [1]
        component: stages.self_rag.SelfRAGDataLoader
        config:
          batch_size: 1
          dataset:
            name: RUC-NLPIR/FlashRAG_datasets
            subset: hotpotqa
            split: dev
            question_column: question
            answers_column: golden_answers

      # --- Stage 1: ChromaDB Retriever (corpus from HotpotQA contexts) ---
      - name: Document retriever
        id: 1
        outputs: [2]
        component: stages.self_rag.ChromaRetriever
        polling_policy: utils.queues.polling.FirstSubmittedPolicy
        config:
          corpus_dataset:
            name: RUC-NLPIR/FlashRAG_datasets
            subset: hotpotqa
            split: dev
            context_column: metadata   # build corpus from gold+distractor contexts
            max_context_rows: 300       # harvest contexts from first 300 questions
            max_docs: 20000
          top_k: 5
          collection_name: self_rag_multihop_monolith_corpus

      # --- Stage 2: Monolith Prompt Formatter ---
      - name: Monolith formatter
        id: 2
        outputs: [3]
        component: stages.self_rag.MonolithFormatter
        config:
          tokenizer_stage_id: 3

      # --- Stage 3: Monolith LLM (single large model) ---
      - name: Monolith LLM
        id: 3
        outputs: [4]
        component: stages.llm_huggingface.Inference
        config:
          dtype: torch.bfloat16
          device: cuda
          model:
            name: Qwen/Qwen3.5-9B
            quantize: false
            gen_kwargs:
              max_new_tokens: 256
              do_sample: false

      # --- Stage 4: Monolith Router (JSON parser + routing) ---
      - name: Monolith router
        id: 4
        outputs: [5, 6]
        component: stages.self_rag.MonolithRouter
        config:
          accept_stage_id: 5
          retry_stage_id: 6
          end_stage_id: 5
          max_retries: 2

      # --- Stage 5: End Stage (capture sidecar) ---
      - name: End stage
        id: 5
        component: stages.TerminalCapture
        polling_policy: utils.queues.polling.FirstSubmittedPolicy

      # --- Stage 6: Query Rewrite Formatter ---
      - name: Query rewrite formatter
        id: 6
        outputs: [7]
        component: stages.self_rag.QuestionRewriterFormatter
        config:
          tokenizer_stage_id: 3

      # --- Stage 7: Query Rewrite LLM (shares monolith model) ---
      - name: Query rewrite LLM
        id: 7
        outputs: [1]
        component: stages.llm_huggingface.Inference
        config:
          dtype: torch.bfloat16
          device: cuda
          model:
            name: Qwen/Qwen3.5-9B
            quantize: false
            gen_kwargs:
              max_new_tokens: 128
              do_sample: false
          depends_on_id: 3
