name: "Self-RAG Monolith 4B — vLLM server (factoid, CUDA)"
# Same monolith topology as factoid_monolith_4b_cuda.yml, but the LLM stages
# are served by a local vLLM server (launched in-process) and called over its
# OpenAI-compatible HTTP API via litellm. Stage 3 owns the server; stage 7
# reuses it via depends_on_id (one server, shared).
#
# NOTE (Phase 1): requests are issued one at a time per stage, so vLLM's
# continuous batching does not yet engage — this validates lifecycle + API
# correctness. The concurrent dispatcher (dynamic batching) lands in Phase 2.
listeners:
  - dcgmi
  - top
  - iostat
pipelines:
  - name: Self-RAG Monolith 4B vLLM
    inputs: [0]
    outputs: [5]
    dataset_stage_id: 0
    loadgen:
      component: loadgen.PoissonLoadScheduler
      queue_depth: 50
      max_queries: 30
      timeout: 600000
      config:
        rate: 4.0
    stages:
      # --- Stage 0: Question DataLoader ---
      - name: Question dataloader
        id: 0
        outputs: [1]
        component: stages.self_rag.SelfRAGDataLoader
        config:
          batch_size: 1
          dataset:
            name: rag-datasets/rag-mini-wikipedia
            subset: question-answer
            split: test
            question_column: question
            answers_column: answer

      # --- Stage 1: ChromaDB Retriever ---
      - name: Document retriever
        id: 1
        outputs: [2]
        component: stages.self_rag.ChromaRetriever
        polling_policy: utils.queues.polling.FirstSubmittedPolicy
        config:
          corpus_dataset:
            name: rag-datasets/rag-mini-wikipedia
            subset: text-corpus
            split: passages
            text_column: passage
            max_docs: 3200
          top_k: 3
          collection_name: self_rag_factoid_monolith_corpus

      # --- Stage 2: Monolith Prompt Formatter ---
      - name: Monolith formatter
        id: 2
        outputs: [3]
        component: stages.self_rag.MonolithFormatter
        config:
          tokenizer_stage_id: 3

      # --- Stage 3: Monolith LLM (owns the vLLM server) ---
      - name: Monolith LLM
        id: 3
        outputs: [4]
        component: stages.llm_server.Inference
        config:
          server:
            engine: vllm
            model: Qwen/Qwen3.5-4B
            port: 0                      # auto-pick a free port
            gpu_memory_utilization: 0.9
          model:
            gen_kwargs:
              max_new_tokens: 256
              do_sample: false

      # --- Stage 4: Monolith Router (JSON parser + routing) ---
      - name: Monolith router
        id: 4
        outputs: [5, 6]
        component: stages.self_rag.MonolithRouter
        config:
          accept_stage_id: 5
          retry_stage_id: 6
          end_stage_id: 5
          max_retries: 2

      # --- Stage 5: End Stage (capture sidecar) ---
      - name: End stage
        id: 5
        component: stages.TerminalCapture
        polling_policy: utils.queues.polling.FirstSubmittedPolicy

      # --- Stage 6: Query Rewrite Formatter ---
      - name: Query rewrite formatter
        id: 6
        outputs: [7]
        component: stages.self_rag.QuestionRewriterFormatter
        config:
          tokenizer_stage_id: 3

      # --- Stage 7: Query Rewrite LLM (reuses the stage-3 vLLM server) ---
      - name: Query rewrite LLM
        id: 7
        outputs: [1]
        component: stages.llm_server.Inference
        config:
          model:
            gen_kwargs:
              max_new_tokens: 128
              do_sample: false
          depends_on_id: 3
