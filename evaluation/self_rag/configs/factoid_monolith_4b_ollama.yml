name: "Self-RAG Monolith 4B — Ollama server (factoid)"
# Same monolith topology as factoid_monolith_4b_cuda.yml, served by a local
# Ollama server (launched in-process) and called over its HTTP API via litellm.
# Ollama runs cross-platform (NVIDIA + Apple Silicon), so this is the portable
# local-engine variant. Stage 3 owns the server; stage 7 reuses it.
#
# `tokenizer_name` points at a HF repo so the formatter can chat-template the
# prompt; the Ollama `model` tag is used for generation.
listeners:
  - dcgmi
  - top
  - iostat
pipelines:
  - name: Self-RAG Monolith 4B Ollama
    inputs: [0]
    outputs: [5]
    dataset_stage_id: 0
    loadgen:
      component: loadgen.PoissonLoadScheduler
      queue_depth: 50
      max_queries: 30
      timeout: 600000
      config:
        rate: 4.0
    stages:
      # --- Stage 0: Question DataLoader ---
      - name: Question dataloader
        id: 0
        outputs: [1]
        component: stages.self_rag.SelfRAGDataLoader
        config:
          batch_size: 1
          dataset:
            name: rag-datasets/rag-mini-wikipedia
            subset: question-answer
            split: test
            question_column: question
            answers_column: answer

      # --- Stage 1: ChromaDB Retriever ---
      - name: Document retriever
        id: 1
        outputs: [2]
        component: stages.self_rag.ChromaRetriever
        polling_policy: utils.queues.polling.FirstSubmittedPolicy
        config:
          corpus_dataset:
            name: rag-datasets/rag-mini-wikipedia
            subset: text-corpus
            split: passages
            text_column: passage
            max_docs: 3200
          top_k: 3
          collection_name: self_rag_factoid_monolith_corpus

      # --- Stage 2: Monolith Prompt Formatter ---
      - name: Monolith formatter
        id: 2
        outputs: [3]
        component: stages.self_rag.MonolithFormatter
        config:
          tokenizer_stage_id: 3

      # --- Stage 3: Monolith LLM (owns the Ollama server) ---
      - name: Monolith LLM
        id: 3
        outputs: [4]
        component: stages.llm_server.Inference
        config:
          server:
            engine: ollama
            model: qwen3:4b
            port: 0                      # auto-pick a free port
          tokenizer_name: Qwen/Qwen3.5-4B
          model:
            gen_kwargs:
              max_new_tokens: 256
              do_sample: false

      # --- Stage 4: Monolith Router (JSON parser + routing) ---
      - name: Monolith router
        id: 4
        outputs: [5, 6]
        component: stages.self_rag.MonolithRouter
        config:
          accept_stage_id: 5
          retry_stage_id: 6
          end_stage_id: 5
          max_retries: 2

      # --- Stage 5: End Stage (capture sidecar) ---
      - name: End stage
        id: 5
        component: stages.TerminalCapture
        polling_policy: utils.queues.polling.FirstSubmittedPolicy

      # --- Stage 6: Query Rewrite Formatter ---
      - name: Query rewrite formatter
        id: 6
        outputs: [7]
        component: stages.self_rag.QuestionRewriterFormatter
        config:
          tokenizer_stage_id: 3

      # --- Stage 7: Query Rewrite LLM (reuses the stage-3 Ollama server) ---
      - name: Query rewrite LLM
        id: 7
        outputs: [1]
        component: stages.llm_server.Inference
        config:
          model:
            gen_kwargs:
              max_new_tokens: 128
              do_sample: false
          depends_on_id: 3
