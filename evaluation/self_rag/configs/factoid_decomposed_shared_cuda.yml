name: "Self-RAG Decomposed-Shared — 1x4B, 3 calls (factoid, CUDA)"
# Logical decomposition on ONE resident 4B instance: same decomposed graph
# (grade -> generate -> hallucination-check -> optional rewrite) and the same
# per-role narrow prompts as factoid_decomposed_cuda.yml, but every LLM stage
# SHARES a single loaded 4B via depends_on_id (stage 3 owns the model + mutex).
# This isolates physical decomposition (3 separate instances) from logical
# decomposition (3 narrow calls on one model):
#   - vs 4B decomposed (3 instances): measures what the extra instances buy
#     (cross-query overlap) at the cost of ~3x model memory.
#   - vs 4B monolith (single call): measures what splitting one call into three
#     narrow calls buys (robustness) at equal resident memory.
# All formatters point tokenizer_stage_id at the model owner (stage 3); the
# dependent stages do not load their own tokenizer. Retrieval is held fixed by
# reusing the decomposed Chroma collection. Because all four LLM stages share
# ONE mutex, generation is serialized on the single instance (true single-
# instance behavior), so any throughput edge over the monolith comes from
# overlapping the cheap CPU stages, not from concurrent generation.
listeners:
  - dcgmi
  - top
  - iostat
pipelines:
  - name: Self-RAG Decomposed-Shared
    inputs: [0]
    outputs: [12]
    dataset_stage_id: 0
    loadgen:
      component: loadgen.PoissonLoadScheduler
      queue_depth: 50
      max_queries: 30
      timeout: 600000
      config:
        rate: 4.0
    stages:
      # --- Stage 0: Question DataLoader ---
      - name: Question dataloader
        id: 0
        outputs: [1]
        component: stages.self_rag.SelfRAGDataLoader
        config:
          batch_size: 1
          dataset:
            name: rag-datasets/rag-mini-wikipedia
            subset: question-answer
            split: test
            question_column: question
            answers_column: answer

      # --- Stage 1: ChromaDB Retriever ---
      - name: Document retriever
        id: 1
        outputs: [2]
        component: stages.self_rag.ChromaRetriever
        polling_policy: utils.queues.polling.FirstSubmittedPolicy
        config:
          corpus_dataset:
            name: rag-datasets/rag-mini-wikipedia
            subset: text-corpus
            split: passages
            text_column: passage
            max_docs: 3200
          top_k: 3
          collection_name: self_rag_factoid_decomposed_corpus

      # --- Stage 2: Retrieval Grader Formatter ---
      - name: Retrieval grader formatter
        id: 2
        outputs: [3]
        component: stages.self_rag.RetrievalGraderFormatter
        config:
          tokenizer_stage_id: 3

      # --- Stage 3: Shared LLM — grade call (owns the single 4B + mutex) ---
      - name: Shared LLM (grade)
        id: 3
        outputs: [4]
        component: stages.llm_huggingface.Inference
        config:
          dtype: torch.bfloat16
          device: cuda
          model:
            name: Qwen/Qwen3.5-4B
            quantize: false
            gen_kwargs:
              max_new_tokens: 16
              do_sample: false

      # --- Stage 4: Grade Router ---
      - name: Grade router
        id: 4
        outputs: [5, 10, 12]
        component: stages.self_rag.BinaryRouter
        config:
          max_retries: 2
          retry_is_yes: False
          yes_stage_id: 5
          no_stage_id: 10
          end_stage_id: 12

      # --- Stage 5: Answer Generator Formatter ---
      - name: Answer generator formatter
        id: 5
        outputs: [6]
        component: stages.self_rag.AnswerGeneratorFormatter
        polling_policy: utils.queues.polling.FirstSubmittedPolicy
        config:
          tokenizer_stage_id: 3

      # --- Stage 6: Shared LLM — generate call (shares stage 3's 4B) ---
      - name: Shared LLM (generate)
        id: 6
        outputs: [7]
        component: stages.llm_huggingface.Inference
        config:
          dtype: torch.bfloat16
          device: cuda
          model:
            name: Qwen/Qwen3.5-4B
            quantize: false
            gen_kwargs:
              max_new_tokens: 256
              do_sample: false
          depends_on_id: 3

      # --- Stage 7: Hallucination Grader Formatter ---
      - name: Hallucination grader formatter
        id: 7
        outputs: [8]
        component: stages.self_rag.HallucinationGraderFormatter
        config:
          tokenizer_stage_id: 3

      # --- Stage 8: Shared LLM — hallucination call (shares stage 3's 4B) ---
      - name: Shared LLM (hallucination)
        id: 8
        outputs: [9]
        component: stages.llm_huggingface.Inference
        config:
          dtype: torch.bfloat16
          device: cuda
          model:
            name: Qwen/Qwen3.5-4B
            quantize: false
            gen_kwargs:
              max_new_tokens: 16
              do_sample: false
          depends_on_id: 3

      # --- Stage 9: Hallucination Router ---
      - name: Hallucination router
        id: 9
        outputs: [5, 12, 12]
        component: stages.self_rag.BinaryRouter
        config:
          max_retries: 2
          retry_is_yes: True
          yes_stage_id: 5
          no_stage_id: 12
          end_stage_id: 12

      # --- Stage 10: Query Rewrite Formatter ---
      - name: Query rewrite formatter
        id: 10
        outputs: [11]
        component: stages.self_rag.QuestionRewriterFormatter
        config:
          tokenizer_stage_id: 3

      # --- Stage 11: Shared LLM — rewrite call (shares stage 3's 4B) ---
      - name: Shared LLM (rewrite)
        id: 11
        outputs: [1]
        component: stages.llm_huggingface.Inference
        config:
          dtype: torch.bfloat16
          device: cuda
          model:
            name: Qwen/Qwen3.5-4B
            quantize: false
            gen_kwargs:
              max_new_tokens: 128
              do_sample: false
          depends_on_id: 3

      # --- Stage 12: End Stage (capture sidecar) ---
      - name: End stage
        id: 12
        component: stages.TerminalCapture
        polling_policy: utils.queues.polling.FirstSubmittedPolicy
