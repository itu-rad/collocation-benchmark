name: "Rosetta Stone - Topology Comparison (CUDA)"
listeners:
  - dcgmi
  - top
  - iostat
pipelines:
  - name: Rosetta Monolith
    inputs: [0]
    outputs: [5]
    dataset_stage_id: 0
    loadgen:
      component: loadgen.PoissonLoadScheduler
      queue_depth: 50
      max_queries: 30
      timeout: 600000
      config:
        rate: 4.0
    stages:
      # --- Stage 0: Question DataLoader ---
      - name: Question dataloader
        id: 0
        outputs: [1]
        component: stages.rosetta_rag.RosettaDataLoader
        config:
          batch_size: 1
          dataset:
            name: rag-datasets/rag-mini-wikipedia
            subset: question-answer
            split: test
            question_column: question
            answers_column: answer

      # --- Stage 1: ChromaDB Retriever ---
      - name: Document retriever
        id: 1
        outputs: [2]
        component: stages.rosetta_rag.ChromaRetriever
        polling_policy: utils.queues.polling.FirstSubmittedPolicy
        config:
          corpus_dataset:
            name: rag-datasets/rag-mini-wikipedia
            subset: text-corpus
            split: passages
            text_column: passage
            max_docs: 3200
          top_k: 3
          collection_name: rosetta_monolith_corpus

      # --- Stage 2: Monolith Prompt Formatter ---
      - name: Monolith formatter
        id: 2
        outputs: [3]
        component: stages.rosetta_rag.MonolithFormatter
        config:
          tokenizer_stage_id: 3

      # --- Stage 3: Monolith LLM (single large model) ---
      - name: Monolith LLM
        id: 3
        outputs: [4]
        component: stages.llm_huggingface.Inference
        config:
          dtype: torch.bfloat16
          device: cuda
          model:
            name: Qwen/Qwen3.5-9B
            quantize: false
            gen_kwargs:
              max_new_tokens: 256
              do_sample: false

      # --- Stage 4: Monolith Router (JSON parser + routing) ---
      - name: Monolith router
        id: 4
        outputs: [5, 6]
        component: stages.rosetta_rag.MonolithRouter
        config:
          accept_stage_id: 5
          retry_stage_id: 6
          end_stage_id: 5
          max_retries: 2

      # --- Stage 5: End Stage (capture sidecar) ---
      - name: End stage
        id: 5
        component: stages.TerminalCapture
        polling_policy: utils.queues.polling.FirstSubmittedPolicy

      # --- Stage 6: Query Rewrite Formatter (reuse self_rag) ---
      - name: Query rewrite formatter
        id: 6
        outputs: [7]
        component: stages.self_rag.QuestionRewriterFormatter
        config:
          tokenizer_stage_id: 3

      # --- Stage 7: Query Rewrite LLM (shares monolith model) ---
      - name: Query rewrite LLM
        id: 7
        outputs: [1]
        component: stages.llm_huggingface.Inference
        config:
          dtype: torch.bfloat16
          device: cuda
          model:
            name: Qwen/Qwen3.5-9B
            quantize: false
            gen_kwargs:
              max_new_tokens: 128
              do_sample: false
          depends_on_id: 3
