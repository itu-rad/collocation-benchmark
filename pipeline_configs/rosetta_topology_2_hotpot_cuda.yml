name: "Rosetta Stone - Topology Comparison (CUDA, HotpotQA multi-hop)"
listeners:
  - dcgmi
  - top
  - iostat
pipelines:
  - name: Rosetta Pipeline Hotpot
    inputs: [0]
    outputs: [12]
    dataset_stage_id: 0
    loadgen:
      component: loadgen.PoissonLoadScheduler
      queue_depth: 50
      max_queries: 30
      timeout: 600000
      config:
        rate: 4.0
    stages:
      # --- Stage 0: Question DataLoader (HotpotQA multi-hop) ---
      - name: Question dataloader
        id: 0
        outputs: [1]
        component: stages.rosetta_rag.RosettaDataLoader
        config:
          batch_size: 1
          dataset:
            name: RUC-NLPIR/FlashRAG_datasets
            subset: hotpotqa
            split: dev
            question_column: question
            answers_column: golden_answers

      # --- Stage 1: ChromaDB Retriever (corpus from HotpotQA contexts) ---
      - name: Document retriever
        id: 1
        outputs: [2]
        component: stages.rosetta_rag.ChromaRetriever
        polling_policy: utils.queues.polling.FirstSubmittedPolicy
        config:
          corpus_dataset:
            name: RUC-NLPIR/FlashRAG_datasets
            subset: hotpotqa
            split: dev
            context_column: metadata
            max_context_rows: 300
            max_docs: 20000
          top_k: 5
          collection_name: rosetta_hotpot_pipeline_corpus

      # --- Stage 2: Retrieval Grader Formatter (reuse self_rag) ---
      - name: Retrieval grader formatter
        id: 2
        outputs: [3]
        component: stages.self_rag.RetrievalGraderFormatter
        config:
          tokenizer_stage_id: 3

      # --- Stage 3: Grader LLM (separate instance #1) ---
      - name: Grader LLM
        id: 3
        outputs: [4]
        component: stages.llm_huggingface.Inference
        config:
          dtype: torch.bfloat16
          device: cuda
          model:
            name: Qwen/Qwen3.5-4B
            quantize: false
            gen_kwargs:
              max_new_tokens: 16
              do_sample: false

      # --- Stage 4: Grade Router (reuse self_rag BinaryRouter) ---
      - name: Grade router
        id: 4
        outputs: [5, 10, 12]
        component: stages.self_rag.BinaryRouter
        config:
          max_retries: 2
          retry_is_yes: False
          yes_stage_id: 5
          no_stage_id: 10
          end_stage_id: 12

      # --- Stage 5: Answer Generator Formatter (reuse self_rag) ---
      - name: Answer generator formatter
        id: 5
        outputs: [6]
        component: stages.self_rag.AnswerGeneratorFormatter
        polling_policy: utils.queues.polling.FirstSubmittedPolicy
        config:
          tokenizer_stage_id: 6

      # --- Stage 6: Generator LLM (separate instance #2) ---
      - name: Generator LLM
        id: 6
        outputs: [7]
        component: stages.llm_huggingface.Inference
        config:
          dtype: torch.bfloat16
          device: cuda
          model:
            name: Qwen/Qwen3.5-4B
            quantize: false
            gen_kwargs:
              max_new_tokens: 256
              do_sample: false

      # --- Stage 7: Hallucination Grader Formatter (reuse self_rag) ---
      - name: Hallucination grader formatter
        id: 7
        outputs: [8]
        component: stages.self_rag.HallucinationGraderFormatter
        config:
          tokenizer_stage_id: 8

      # --- Stage 8: Hallucination LLM (separate instance #3) ---
      - name: Hallucination LLM
        id: 8
        outputs: [9]
        component: stages.llm_huggingface.Inference
        config:
          dtype: torch.bfloat16
          device: cuda
          model:
            name: Qwen/Qwen3.5-4B
            quantize: false
            gen_kwargs:
              max_new_tokens: 16
              do_sample: false

      # --- Stage 9: Hallucination Router (reuse self_rag BinaryRouter) ---
      - name: Hallucination router
        id: 9
        outputs: [5, 12, 12]
        component: stages.self_rag.BinaryRouter
        config:
          max_retries: 2
          retry_is_yes: True
          yes_stage_id: 5
          no_stage_id: 12
          end_stage_id: 12

      # --- Stage 10: Query Rewrite Formatter (reuse self_rag) ---
      - name: Query rewrite formatter
        id: 10
        outputs: [11]
        component: stages.self_rag.QuestionRewriterFormatter
        config:
          tokenizer_stage_id: 3

      # --- Stage 11: Query Rewrite LLM (shares Grader model) ---
      - name: Query rewrite LLM
        id: 11
        outputs: [1]
        component: stages.llm_huggingface.Inference
        config:
          dtype: torch.bfloat16
          device: cuda
          model:
            name: Qwen/Qwen3.5-4B
            quantize: false
            gen_kwargs:
              max_new_tokens: 128
              do_sample: false
          depends_on_id: 3

      # --- Stage 12: End Stage (capture sidecar) ---
      - name: End stage
        id: 12
        component: stages.TerminalCapture
        polling_policy: utils.queues.polling.FirstSubmittedPolicy
